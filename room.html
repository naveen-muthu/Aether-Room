<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Room - Main Relaxation Room</title>
    <link rel="stylesheet" href="room.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="night-mode">
    <nav class="navbar">
        <div class="logo"><strong>Aether Room</strong></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="scenes.html">Scenes</a>
            <a href="upload.html">Upload</a>
            <a href="chat.html">Chat</a>
        </div>
        <div class="controls">
            <button class="btn-toggle" id="theme-toggle">
                <i class="fa-solid fa-sun" id="theme-icon"></i> Day Mode
            </button>
        </div>
    </nav>

    <main class="room-container">
        <div class="room-walls">
            
            <!-- Bookshelf Area -->
            <div class="interactive-area bookshelf-area" id="bookshelf">
                <i class="fa-solid fa-book-open"></i>
                <h3>Library</h3>
                <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 10px;">Saved Mixes</p>
            </div>

            <!-- Window Area -->
            <div class="interactive-area window-area" id="window">
                <div class="weather-display" id="weather-display">
                    <i class="fa-solid fa-cloud-moon-rain"></i> <span>Night Rain</span>
                </div>
            </div>

            <!-- Desk Area containing Radio, Lamp, Cat -->
            <div class="desk-area">
                <div class="radio-area" id="radio">
                    <i class="fa-solid fa-radio"></i>
                    <h3>Radio</h3>
                </div>
                
                <div class="lamp-area" id="lamp">
                    <i class="fa-solid fa-lightbulb"></i>
                    <h3>Lamp</h3>
                </div>

                <div class="cat-area" id="cat">
                    <i class="fa-solid fa-cat"></i>
                    <h3>Cat</h3>
                </div>
            </div>

        </div>
    </main>

    <!-- Status Toast for feedback -->
    <div class="status-toast" id="toast">Interaction Feedback</div>

    <script src="room.js"></script>
</body>
</html>
