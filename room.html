<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Room</title>

    <link rel="stylesheet" href="room.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Background -->

    <div class="background"></div>
    <div class="overlay"></div>

    <!-- Main Dashboard -->

    <div class="dashboard">

        <!-- Left Sidebar -->

        <aside class="sidebar">

            <div class="logo">
                ∞
            </div>

            <a href="#" class="nav-btn active">
                <i class="fa-solid fa-house"></i>
            </a>

            <a href="scenes.html" class="nav-btn">
                <i class="fa-solid fa-image"></i>
            </a>

            <a href="upload.html" class="nav-btn">
                <i class="fa-solid fa-upload"></i>
            </a>

            <a href="chat.html" class="nav-btn">
                <i class="fa-solid fa-comments"></i>
            </a>

            <a href="#" class="nav-btn">
                <i class="fa-solid fa-gear"></i>
            </a>

        </aside>

        <!-- Center Area -->

        <main class="main-content">

            <div class="welcome-card">

                <div>
                    <h2>Welcome Back</h2>
                    <h1>Infinity Room</h1>
                </div>

                <div class="clock-box">
                    <span id="clock">00:00</span>
                </div>

            </div>

            <!-- Main Screen -->

            <section class="screen-card">

                <div class="screen-overlay">

                    <h1>RELAX</h1>

                    <p>
                        Escape. Focus. Breathe.
                    </p>

                    <button class="main-btn">
                        Start Session
                    </button>

                </div>

            </section>

            <!-- Quick Cards -->

            <section class="quick-grid">

                <div class="quick-card">
                    <h3>Rain Room</h3>
                    <p>Soft rainfall ambience</p>
                </div>

                <div class="quick-card">
                    <h3>Forest</h3>
                    <p>Birds & nature sounds</p>
                </div>

                <div class="quick-card">
                    <h3>Train Journey</h3>
                    <p>Endless relaxing travel</p>
                </div>

            </section>

        </main>

        <!-- Right Controls -->

        <aside class="control-panel">

            <div class="control-card">

                <h3>Ambient Controls</h3>

                <div class="sound-item">
                    🌧 Rain Sound
                </div>

                <div class="sound-item">
                    ⛈ Storm Sound
                </div>

                <div class="sound-item">
                    🔥 Fireplace
                </div>

                <div class="sound-item">
                    🎵 LoFi Music
                </div>

            </div>

            <div class="control-card">

                <h3>Room Settings</h3>

                <button class="toggle-btn">
                    🌙 Day / Night
                </button>

            </div>

        </aside>

    </div>

    <script src="room.js"></script>

</body>
</html>
